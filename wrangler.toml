#:schema node_modules/wrangler/config-schema.json
name = "drizby-docs"
main = "dist/worker.js"
compatibility_date = "2024-08-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[env.production]
name = "drizby-docs"
routes = [
  { pattern = "www.drizby.com/docs/*", zone_name = "drizby.com" }
]

[env.staging]
name = "drizby-docs-staging"
